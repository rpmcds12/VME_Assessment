name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: app-vme-analyzer-prod

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Run all tests
  # -----------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend tests
        run: python3 -m pytest tests/ -q --tb=short
        working-directory: backend

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test -- --run
        working-directory: frontend

  # -----------------------------------------------------------------------
  # Job 2: Build and deploy (main branch only)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Assemble deployment package
        run: |
          # Copy frontend build into backend directory so it's included in the zip
          mkdir -p backend/frontend/dist
          cp -r frontend/dist/. backend/frontend/dist/

          # Zip backend directory contents (not the directory itself)
          cd backend
          zip -r ../deploy.zip . \
            -x "*.pyc" \
            -x "*/__pycache__/*" \
            -x "*/.pytest_cache/*" \
            -x "*.coverage" \
            -x ".coverage" \
            -x "vme_analyzer.db"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
